<section class="hero-section">

    <div class="overlay">

        <!-- Navbar -->
        <header class="top-navbar">

            <div class="logo-section">

                <img src="/FIFALogo/FIFA-2026-World-Cup.png"
                     class="logo">

                <div class="title-section">
                    <h5>FIFA World Cup 2026</h5>
                    <span>Predictor</span>
                </div>

            </div>

            <div class="profile-section">

                <img
                    [src]="profileImage"
                    class="profile-image">

            </div>

        </header>


        <!-- Greeting -->

        <div class="greeting">

            <h2>
                {{emoji}} {{greeting}}, {{userName}}
            </h2>

            <p>
                Ready to predict today's matches?
            </p>

        </div>

    </div>

</section>
<app-footer></app-footer>
