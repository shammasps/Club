<div class="profile-page">

    <!-- Header -->
    <div class="profile-header">

        <button
            class="back-btn"
            (click)="goBack()">

            <i class="bi bi-arrow-left"></i>

        </button>

        <h2>My Profile</h2>

    </div>

    <!-- Profile Image -->
    <div class="profile-top">

        <div class="image-section">

            <img
                [src]="profileImage"
                class="profile-image"
                alt="Profile">

            <label class="camera-btn">

                <i class="bi bi-camera-fill"></i>

                <input
                    type="file"
                    accept="image/*"
                    hidden
                    (change)="onImageSelected($event)">

            </label>

        </div>

    </div>

    <!-- Main Card -->
    <div class="profile-card">

        <h3 class="user-name">

            {{profile.userName}}

        </h3>

        <p class="user-email">

            {{profile.email}}

        </p>

        <!-- Statistics -->

        <div class="stats-section">

            <div class="stat-card">

                <i class="bi bi-trophy-fill"></i>

                <h4>{{profile.totalPoints}}</h4>

                <span>Total Points</span>

            </div>

            <div class="stat-card">

                <i class="bi bi-award-fill"></i>

                <h4>#{{profile.rank}}</h4>

                <span>Rank</span>

            </div>

            <div class="stat-card">

                <i class="bi bi-controller"></i>

                <h4>{{profile.totalPrediction}}</h4>

                <span>Predictions</span>

            </div>

        </div>

        <!-- Form -->

        <div class="form-section">

            <div class="form-group">

                <label>

                    <i class="bi bi-person"></i>

                    User Name

                </label>

                <input
                    type="text"
                    class="form-control"
                    [(ngModel)]="profile.userName">

            </div>

            <div class="form-group">

                <label>

                    <i class="bi bi-envelope"></i>

                    Email

                </label>

                <input
                    type="email"
                    class="form-control"
                    [value]="profile.email"
                    readonly>

            </div>

        </div>

        <!-- Buttons -->

        <div class="button-section">

            <button
                class="btn-save"
                (click)="saveProfile()">

                <i class="bi bi-check-circle"></i>

                Save Changes

            </button>

            <button
                class="btn-logout"
                (click)="logout()">

                <i class="bi bi-box-arrow-right"></i>

                Logout

            </button>

        </div>

    </div>

</div>

<app-footer></app-footer>
